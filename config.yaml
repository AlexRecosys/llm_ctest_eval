# Definiert welche Modelle, welche Temperatur/Parameter, 
# wie viele Wiederholungen pro Funktion, Pfade usw.



# === Modell-Endpunkte ===

models:
  claude:
    api_url: "https://api.anthropic.com/v1/messages"
    model_name: "claude-sonnet-4-6"
    temperature: 0
  deepseek:
    api_url: "https://api.deepseek.com/v1/chat/completions"
    model_name: "deepseek-coder"
    temperature: 0
  qwen:
    api_url: "http://localhost:11434/v1/chat/completions"
    model_name: "qwen3-coder-next:latest"
    temperature: 0

# === Experiment-Parameter ===
experiment:
  runs_per_function: 3
  prompt_version: "prompt_v8.txt"
  gcc_flags: ["-fprofile-arcs", "-ftest-coverage", "-Wall"]

# === Pfade ===
paths:
  functions_dir: "input_testgeneration/functions"
  prompt_dir: "input_testgeneration/prompt_versions"
  src_dir: "src"
  unity_dir: "unity"
  output_tests: "output_tests"
  output_metrics: "output_metrics"
  build_dir: "build"

# === Codebases (Mapping: Codebase-Name -> Header-Datei) ===
codebases:
  csv_codebase: "csv.h"
  cjson_codebase: "cJSON.h"
  gocr_codebase: "gocr.h"
  redis_codebase: "sds.h"